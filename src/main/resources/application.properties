spring.application.name=coupon

# Use dev (H2) when no profile is set — production must pass -Dspring.profiles.active=prd
spring.profiles.default=dev

# Disable Open Session In View - prevents lazy loading outside transactions
spring.jpa.open-in-view=false

# Liquibase configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Hibernate should not manage schema - Liquibase handles it
spring.jpa.hibernate.ddl-auto=none
