databaseChangeLog:
  - changeSet:
      id: 001-create-coupon-table
      author: developer
      changes:
        - createTable:
            tableName: COUPON
            columns:
              - column:
                  name: ID
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CODE
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: DISCOUNT
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: MIN_BASKET_VALUE
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: DESCRIPTION
                  type: varchar(1000)
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-application-table
      author: developer
      changes:
        - createTable:
            tableName: APPLICATION
            columns:
              - column:
                  name: ID
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: COUPON_ID
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: TIMESTAMP
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: APPLICATION
            baseColumnNames: COUPON_ID
            referencedTableName: COUPON
            referencedColumnNames: ID
            constraintName: FK_APPLICATION_COUPON
            onDelete: CASCADE
