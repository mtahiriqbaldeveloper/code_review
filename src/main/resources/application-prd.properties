spring.datasource.url=jdbc:postgresql://localhost:5432/coupon
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Validate schema matches entities - Liquibase manages the actual schema
spring.jpa.hibernate.ddl-auto=validate

# Do NOT run data.sql in production - seed data should be managed separately
spring.sql.init.mode=never

# Liquibase runs migrations automatically on startup
spring.liquibase.enabled=true
spring.liquibase.contexts=prd
